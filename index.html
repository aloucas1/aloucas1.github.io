<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;700;900&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      overflow: hidden;
    }

    /* Glow orb background */
    body::before {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.25) 0%, transparent 70%);
      pointer-events: none;
      animation: breathe 6s ease-in-out infinite;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -30%;
      right: -10%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    @keyframes breathe {
      0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.8; }
      50% { transform: translateX(-50%) scale(1.15); opacity: 1; }
    }

    .container {
      text-align: center;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    .badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #a855f7;
      border: 1px solid rgba(168, 85, 247, 0.35);
      background: rgba(168, 85, 247, 0.08);
      padding: 0.4rem 1rem;
      border-radius: 999px;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: clamp(3rem, 10vw, 7rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
      color: #fff;
    }

    .subtitle {
      margin-top: 1.5rem;
      font-size: 1rem;
      font-weight: 300;
      color: #555;
      letter-spacing: 0.05em;
    }

    /* Progress bar */
    .badge-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      background: #a855f7;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
      position: relative;
      top: -1px;
      animation: blink 1.6s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(168, 85, 247, 0.7); }
      50% { opacity: 0.3; box-shadow: 0 0 0 5px rgba(168, 85, 247, 0); }
    }

    /* Social / noise grid */
    .grid-noise {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }
  </style>
</head>
<body>
  <div class="grid-noise"></div>
  <div class="container">
    <div class="badge"><span class="badge-dot"></span>Coming Soon</div>
    <h1>Something<br>is coming.</h1>
    <p class="subtitle">Something great is on its way — stay tuned.</p>
  </div>
</body>
</html>
